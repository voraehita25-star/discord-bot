# =============================================================================
# Discord Bot - Docker Compose DEVELOPMENT Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================

services:
  bot:
    build:
      dockerfile: docker/Dockerfile  # Use non-prod Dockerfile
    container_name: discord-bot-dev

    environment:
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1

    # Relax resource limits for development
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4.0'
          pids: 200
        reservations:
          memory: 1g
    shm_size: 256m

    # Disable read-only for easier debugging
    read_only: false

    # Mount source code for live editing
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../temp:/app/temp
      - ../cogs:/app/cogs:ro
      - ../utils:/app/utils:ro
      - ../bot.py:/app/bot.py:ro

    # Expose extra ports for debugging.
    # IMPORTANT: bind to 127.0.0.1 explicitly so Docker's port-forward
    # does NOT publish these on every host interface. The in-process
    # services (Health API, WS Dashboard, Prometheus exporter) enforce
    # localhost-only binding inside the container, but Docker's default
    # ``"8080:8080"`` form publishes on host ``0.0.0.0:8080`` and the
    # in-process protection becomes a no-op. ``"127.0.0.1:HOST:CONTAINER"``
    # restores the loopback-only intent on the host side too.
    ports:
      - "127.0.0.1:8080:8080"   # Health API
      - "127.0.0.1:8765:8765"   # WebSocket Dashboard
      - "127.0.0.1:9090:9090"   # Prometheus metrics
