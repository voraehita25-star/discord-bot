# =============================================================================
# Discord Bot - Docker Compose TEST Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm bot
# =============================================================================

services:
  bot:
    container_name: discord-bot-test
    entrypoint: ["python", "-m", "pytest", "tests/", "-x", "--tb=short"]

    environment:
      - TESTING=1
      - LOG_LEVEL=WARNING

    # Minimal resources for CI
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
          pids: 100
        reservations:
          memory: 512m
    shm_size: 128m

    read_only: false

    # No persistent volumes needed for tests
    tmpfs:
      - /tmp:size=512M
      - /app/data:size=256M
      - /app/logs:size=64M
      - /app/temp:size=128M

    # No health check for test runs
    healthcheck:
      disable: true
