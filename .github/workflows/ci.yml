name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Pre-commit Hooks (fast lint/format gate)
  # ============================================================
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Run pre-commit hooks
      # Skip the local pytest-fast hook here — its `language: system` config
      # depends on pytest being installed in the runner's Python env, which
      # the pre-commit action doesn't do. The dedicated `python-test` job
      # runs the full test suite with proper deps already.
      env:
        SKIP: pytest-fast
      # Third-party action: pin to commit SHA, not a tag, so a malicious
      # retag at the upstream repo can't silently land in CI. Comment
      # holds the human-readable version for renovate-style updates.
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  # ============================================================
  # Security Scanning
  # ============================================================
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        # TruffleHog diffs github.event.before..after on push — with the
        # default depth-1 clone the base commit is absent and the scan
        # either errors or silently covers only the tip commit.
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run security scan (bandit)
      run: |
        # Pin to the same bandit the pre-commit hook runs (1.9.4 in
        # .pre-commit-config.yaml) so a new release can't add/drop a check
        # and diverge the local gate from CI.
        pip install "bandit[toml]==1.9.4"
        bandit -c pyproject.toml -r cogs/ utils/ -ll --quiet

    - name: Run dependency audit
      run: |
        pip install pip-audit
        pip-audit --strict --desc

    - name: Scan for hardcoded secrets
      # Third-party action — SHA-pin to insulate CI from upstream
      # supply-chain compromise (retag, deleted release, etc.).
      uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
      with:
        extra_args: --only-verified

  # ============================================================
  # Python Tests & Linting
  # ============================================================
  python-test:
    runs-on: ubuntu-latest
    needs: [pre-commit]
    timeout-minutes: 25
    # Job-level placeholders so every step inherits the dummy creds.
    # Hoisted from per-step env blocks (was duplicated 3x in this job + 1x
    # in benchmark). Tests never validate these values — they just need to
    # be non-empty so config loading doesn't bail. Keep the two jobs in sync
    # for consistency only.
    env:
      DISCORD_TOKEN: "test-token-ci-dummy.not-real.placeholder"
      ANTHROPIC_API_KEY: "test-anthropic-key-not-real"
      GEMINI_API_KEY: "test-gemini-key-not-real"
      CREATOR_ID: "123456789"
      # mypy regression baseline — bump when intentionally adding/fixing
      # type errors. Jumped 16 -> 78 with the mypy 1.x -> 2.x major upgrade
      # (2.x enables stricter default inference; the delta is tooling
      # strictness, not new code defects). Pre-existing arch issues:
      # discord.py union types, sentry SDK signature, lambda inference,
      # ssrf helper signature, method-assign monkeypatch in bot.py.
      MYPY_BASELINE: "78"
    strategy:
      matrix:
        # The runtime floor is ``requires-python = ">=3.14"`` (set in
        # pyproject.toml) so we test on 3.14 only — adding 3.13 would just
        # fail at ``pip install`` because the project itself is 3.14-only.
        # The mismatch worth knowing: ruff's ``target-version = "py313"``
        # (also in pyproject.toml) is INTENTIONALLY one minor below the
        # runtime floor because not every CI tool that ingests ruff config
        # accepts PEP 758 syntax yet. The bot still relies on 3.14
        # features at runtime; ruff just lints against 3.13 syntax rules.
        python-version: ['3.14']

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Pin lint/type tooling so the ruff gate and the mypy baseline ($MYPY_BASELINE)
        # are deterministic across local / pre-commit / CI. ruff matches the SHA-pinned
        # ruff-pre-commit rev (v0.15.17 in .pre-commit-config.yaml). mypy is held to the
        # 2.1 minor (mypy~=2.1.0 == >=2.1.0,<2.2.0) the baseline=78 was calibrated
        # against: a new MINOR can shift inference and the error count, flaking the gate,
        # so ~=2.1.0 (not ~=2.0, which would allow any 2.x minor) keeps only patch bumps.
        # pytest/pytest-asyncio are already pinned via requirements.txt.
        pip install pytest pytest-asyncio pytest-cov "mypy~=2.1.0"

    - name: Run linter (ruff)
      run: |
        pip install ruff==0.15.17
        ruff check .

    - name: Run type checker (mypy)
      run: |
        # Track error count: fail CI if new type errors introduced.
        # BASELINE comes from job-level $MYPY_BASELINE (was hardcoded before).
        BASELINE="${MYPY_BASELINE:-16}"
        # Capture mypy's own exit code separately. ``mypy ... | grep`` swallows
        # the upstream exit so a crash (segfault/import-error/exit=2+) would
        # silently set ERROR_COUNT=0 and pass — that's strictly worse than a
        # real regression. The ``|| MYPY_EXIT=$?`` is load-bearing: GitHub runs
        # this step under ``bash -e``, so a bare nonzero mypy exit would kill
        # the step before the baseline-compare logic below ever executed.
        MYPY_EXIT=0
        mypy cogs/ utils/ bot.py config.py > /tmp/mypy.log 2>&1 || MYPY_EXIT=$?
        ERROR_COUNT=$(grep -c ': error:' /tmp/mypy.log || true)
        # mypy returns 0 (clean) or 1 (type errors found). Anything else is
        # a crash and we should NOT compare counts — fail loudly instead.
        if [ "$MYPY_EXIT" -ne 0 ] && [ "$MYPY_EXIT" -ne 1 ]; then
          echo "::error::mypy crashed (exit=$MYPY_EXIT)"
          tail -n 50 /tmp/mypy.log
          exit 2
        fi
        # Defensive: grep should always print a number, but a future toolchain
        # tweak could surface text. Coerce non-numeric output to a sentinel
        # that fails the threshold check rather than silently passing.
        [[ "$ERROR_COUNT" =~ ^[0-9]+$ ]] || ERROR_COUNT=999
        echo "mypy errors: $ERROR_COUNT (baseline: $BASELINE)"
        if [ "$ERROR_COUNT" -gt "$BASELINE" ]; then
          echo "::error::mypy regression detected! $ERROR_COUNT errors vs $BASELINE baseline"
          exit 1
        fi

    - name: Clear stale bytecode
      run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

    - name: Run tests with coverage
      # Inherits DISCORD_TOKEN/ANTHROPIC_API_KEY/GEMINI_API_KEY/CREATOR_ID
      # from the job-level env block above.
      # CI is non-interactive (no TTY), so the run_tests.ps1 wrapper that strips
      # ``-v`` to avoid the local pipe-freeze hang is intentionally NOT used here
      # — the raw ``pytest -v`` is safe on the runner. The ``-v`` below is
      # redundant with pyproject.toml addopts but kept explicit; don't "fix" it.
      run: |
        python -m pytest tests/ -v --tb=short --cov=cogs --cov=utils --cov-report=xml --cov-report=term --cov-fail-under=55

    - name: Smoke test - import core modules
      run: |
        python -c "
        import utils.database
        import utils.monitoring.logger
        import cogs.ai_core.storage
        import cogs.ai_core.imports
        import cogs.ai_core.api.api_handler
        print('All core module imports OK')
        "

    - name: Smoke test - DB schema init
      run: python scripts/maintenance/schema_smoke.py

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.14'
      # Third-party — SHA-pin. Codecov's bash uploader was compromised
      # in 2021 (CVE-2021-32743); pinning to a known-good commit
      # prevents a repeat from breaking CI silently.
      #
      # ``continue-on-error: true`` instead of
      # ``fail_ci_if_error: false`` — the latter masks ALL upload
      # errors (token, parse, network) as soft warnings; the former
      # lets the action set its real exit code so the job's status is
      # accurate while still not blocking the qa-gate. A corrupt
      # coverage.xml will now show as ⚠ in the matrix instead of ✓
      # without any visible signal.
      continue-on-error: true
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        files: ./coverage.xml
        # ``true`` is required for the ⚠-on-failure behaviour described
        # above: with ``false`` the ACTION itself swallows every upload
        # error and exits 0, so step-level ``continue-on-error`` never
        # engages and failures show as a green ✓. With ``true`` the action
        # exits nonzero and ``continue-on-error: true`` converts that into
        # the visible ⚠ without blocking the qa-gate.
        fail_ci_if_error: true
        verbose: true

  # ============================================================
  # Go Tests & Linting
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go_services

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
      with:
        go-version: '1.26'
        cache-dependency-path: go_services/go.sum

    - name: Run Go tests
      run: go test ./... -v -race -count=1

    - name: Run Go linter
      # Third-party — SHA-pin.
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
      with:
        # Pin to a specific linter binary version. ``v2.12.1`` is the
        # binary release tag, not a floating branch — the action resolves
        # this through its release manifest to a content-addressed
        # download. Bump intentionally when a new minor lands and the
        # warning surface has been reviewed.
        version: v2.12.1
        working-directory: go_services

    - name: Run Go vulnerability check
      # Pin to a specific govulncheck release rather than @latest. ``@latest``
      # makes CI a moving target — any compromised release on the upstream
      # module proxy lands in our build immediately. Bump the pin
      # intentionally when a new govulncheck ships.
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
        govulncheck ./...

  # ============================================================
  # Rust Tests & Linting
  # ============================================================
  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Rust
      # Third-party — SHA-pin so a force-pushed ``stable`` branch doesn't
      # silently change CI's compiler. The action itself still installs
      # whichever toolchain is current at run time; pin the wrapper, not
      # the toolchain version (Rust gets bumped via the toolchain field
      # in rust-toolchain.toml or explicit ``with: toolchain:``).
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-04
      with:
        components: clippy

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust_extensions/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust_extensions/Cargo.lock') }}

    - name: Set up Python 3.14
      # The test harness links libpython (see below), so PyO3's build script
      # needs an interpreter to locate it. setup-python also exports
      # LD_LIBRARY_PATH for its shared build, which the linker needs.
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.14'

    - name: Run Rust tests (extensions)
      working-directory: rust_extensions
      # --no-default-features drops `extension-module`; with it on, the crates
      # deliberately leave CPython symbols unresolved for the interpreter to
      # fill in at import time, which a standalone test binary can't do.
      run: cargo test --all --no-default-features --verbose

    - name: Run Clippy (extensions)
      working-directory: rust_extensions
      run: cargo clippy --all -- -D warnings

    - name: Run Cargo audit (extensions)
      # Pin cargo-audit. Without ``--version``, every CI run installs
      # whatever the registry serves now — a compromised crates.io publish
      # would propagate immediately. Use ``--locked`` so the pinned
      # release uses its own committed Cargo.lock.
      # 0.22.1+ is required to parse CVSS 4.0 advisories — the RustSec DB
      # now contains them and 0.21.2 fails every run with
      # "unsupported CVSS version: 4.0" (verified in CI logs).
      run: |
        cargo install cargo-audit --version 0.22.2 --locked
        cd rust_extensions && cargo audit

  # ============================================================
  # Native Dashboard Tests (Rust + TypeScript)
  # ============================================================
  dashboard-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native_dashboard

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Rust
      # Third-party — SHA-pin so a force-pushed ``stable`` branch doesn't
      # silently change CI's compiler. The action itself still installs
      # whichever toolchain is current at run time; pin the wrapper, not
      # the toolchain version (Rust gets bumped via the toolchain field
      # in rust-toolchain.toml or explicit ``with: toolchain:``).
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-04
      with:
        components: clippy

    - name: Cache Rust dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          native_dashboard/target
        key: ${{ runner.os }}-dashboard-cargo-${{ hashFiles('native_dashboard/Cargo.lock') }}

    - name: Install Tauri system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

    - name: Rust check (dashboard)
      run: cargo check --lib

    - name: Clippy (dashboard)
      run: cargo clippy --lib -- -D warnings

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: native_dashboard/package-lock.json

    - name: Install npm dependencies
      run: npm ci

    - name: TypeScript check
      run: npx tsc --noEmit

    - name: Run vitest
      run: npx vitest run

    # ----- Playwright E2E + a11y + visual regression -----
    # The static HTML is served by python http.server (already required by
    # the bot itself), so no extra runtime dep. Chromium-only to keep CI
    # fast; firefox/webkit can be added later if needed.
    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Build dashboard (TypeScript → JS)
      run: npm run build

    - name: Run Playwright e2e + a11y + visual tests
      run: npx playwright test
      env:
        CI: 'true'

    # On failure, expose screenshots/traces so the diff is debuggable.
    - name: Upload Playwright artifacts on failure
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: playwright-report
        path: |
          native_dashboard/playwright-report/
          native_dashboard/test-results/
        retention-days: 7

  # ============================================================
  # Native Dashboard Windows Smoke Test
  # ============================================================
  dashboard-windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native_dashboard

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-04

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: native_dashboard/package-lock.json

    - name: Install npm dependencies
      run: npm ci

    - name: TypeScript build (Windows)
      shell: pwsh
      run: npm.cmd run build

    - name: Run vitest (Windows)
      run: npx vitest run

    - name: Rust build (dashboard, Windows)
      run: cargo build

  # ============================================================
  # QA Gate (all tests must pass before Docker build)
  # ============================================================
  qa-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [python-test, go-test, rust-test, dashboard-test, dashboard-windows-smoke, security]
    steps:
    - name: All checks passed
      run: echo "✅ All tests, linting, and security checks passed — ready for build"

  # ============================================================
  # Docker Build Smoke Test
  # ============================================================
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [qa-gate]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Build Docker image (dev)
      run: docker build -f docker/Dockerfile -t discord-bot:test .

    - name: Build Docker image (prod)
      run: docker build -f docker/Dockerfile.prod -t discord-bot:prod-test .

    - name: Verify Docker image
      run: docker run --rm discord-bot:test python -c "import discord; print('OK')"

    - name: Check Docker image sizes
      run: |
        DEV_SIZE=$(docker image inspect discord-bot:test --format='{{.Size}}')
        PROD_SIZE=$(docker image inspect discord-bot:prod-test --format='{{.Size}}')
        DEV_MB=$((DEV_SIZE / 1048576))
        PROD_MB=$((PROD_SIZE / 1048576))
        echo "Dev image:  ${DEV_MB}MB"
        echo "Prod image: ${PROD_MB}MB"
        # Fail if prod image exceeds 3GB
        if [ "$PROD_MB" -gt 3072 ]; then
          echo "::error::Prod image too large: ${PROD_MB}MB > 3072MB limit"
          exit 1
        fi

  # ============================================================
  # Performance Benchmark (import time + startup check)
  # ============================================================
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python-test]
    # Same placeholder creds as python-test — values are arbitrary
    # non-empty dummies; nothing validates their format.
    env:
      DISCORD_TOKEN: "test-token-ci-dummy.not-real.placeholder"
      ANTHROPIC_API_KEY: "test-anthropic-key-not-real"
      GEMINI_API_KEY: "test-gemini-key-not-real"
      CREATOR_ID: "123456789"
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Benchmark core module import time
      # Env inherited from job-level block above.
      run: |
        python -c "
        import time
        modules = [
            'cogs.ai_core.storage',
            'cogs.ai_core.imports',
            'utils.database',
            'utils.monitoring.metrics',
        ]
        total = 0
        for mod in modules:
            start = time.perf_counter()
            __import__(mod)
            elapsed = (time.perf_counter() - start) * 1000
            total += elapsed
            print(f'  {mod}: {elapsed:.0f}ms')
        print(f'Total import time: {total:.0f}ms')
        if total > 10000:
            print('::warning::Core module imports exceed 10s')
        "
