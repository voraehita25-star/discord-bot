# Pre-commit Hooks Configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - extremely fast Python linter and formatter
  # Pinned by commit SHA (not tag) so a tag retag can't swap the hook code.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 6fec9b7edb08fd9989088709d864a7826dc74e80  # v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c  # v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^native_dashboard/
      - id: end-of-file-fixer
        exclude: ^native_dashboard/
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-ast

  # Fast pytest before commit (skip slow tests)
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast)
        entry: python -m pytest tests/ -x -q --override-ini=addopts= -m "not slow" -p no:warnings --tb=line
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 22b4226078b041a16bf05163347a66ab4dbcf3a5  # 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

# CI config
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  skip: []
